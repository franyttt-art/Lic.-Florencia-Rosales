<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Turnos – Lic. Florencia Rosales</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#e9f0f7,#f5f7fb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#3a8d4f;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2f7441;
}

.admin{
margin-top:30px;
padding-top:20px;
border-top:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<h1>Turnos - Lic. Florencia Rosales</h1>

<div class="subtitle">
Consultorio presencial<br>
153 e 518 y 519 – Melchor Romero – La Plata
</div>

<h3>Reservar turno</h3>

<input id="name" placeholder="Nombre completo">

<input id="email" placeholder="Email">

<select id="time">
<option value="">Elegir horario</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
</select>

<button onclick="reservar()">Reservar turno</button>

<div class="admin">

<h3>Panel administrador</h3>

<input type="password" id="adminPass" placeholder="Contraseña">

<button onclick="verTurnos()">Entrar</button>

<div id="turnos"></div>

</div>

</div>

<script>

const supabase = supabase.createClient(
"TU_URL_SUPABASE",
"TU_ANON_KEY"
)

async function reservar(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const time = document.getElementById("time").value

if(!name || !email || !time){
alert("Completar todos los campos")
return
}

const { error } = await supabase
.from("appointments")
.insert([{name,email,appointment_time:time}])

if(error){

alert("Ese turno ya fue reservado")

}else{

alert("Turno reservado correctamente")

}

}

async function verTurnos(){

const pass = document.getElementById("adminPass").value

if(pass !== "1234"){
alert("Contraseña incorrecta")
return
}

const { data } = await supabase
.from("appointments")
.select("*")

let html=""

data.forEach(t=>{
html += `<p>${t.appointment_time} - ${t.name}</p>`
})

document.getElementById("turnos").innerHTML = html

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda de Turnos - Lic. Florencia Rosales</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
width:80%;
margin:5px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:disabled{
background:gray;
}

.admin{
margin-top:40px;
padding:20px;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h1>Turnos - Lic. Florencia Rosales</h1>

<p>
Dirección consultorio presencial:<br>
<b>153 e 518 y 519 – Melchor Romero, La Plata</b>
</p>

<h2>Reservar turno</h2>

<input id="name" placeholder="Nombre"><br>
<input id="email" placeholder="Email"><br>

<select id="slot"></select>

<br>
<button onclick="reservar()">Reservar turno</button>

<p id="msg"></p>

<div class="admin">

<h2>Panel administrador</h2>

<input id="adminpass" type="password" placeholder="Contraseña admin">
<button onclick="login()">Entrar</button>

<div id="adminpanel" style="display:none">

<h3>Turnos reservados</h3>

<ul id="lista"></ul>

</div>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://yodefzidtoluudozgces.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZGVmemlkdG9sdXVkb3pnY2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDEwOTUsImV4cCI6MjA4ODM3NzA5NX0.ZiHokkUpT7s1CebAl9roYGj39mN5r8lu17dz2gmrFCU"
)

const ADMIN_PASS="Apolo2000"

const horarios=[

"Lunes 13:00","Lunes 13:40","Lunes 14:20","Lunes 15:00","Lunes 15:40","Lunes 16:20","Lunes 17:00","Lunes 17:40",

"Miércoles 14:00","Miércoles 14:40","Miércoles 15:20","Miércoles 16:00","Miércoles 16:40","Miércoles 17:20","Miércoles 18:00","Miércoles 18:40",

"Jueves 18:00","Jueves 18:40","Jueves 19:20",

"Viernes 09:00","Viernes 09:40","Viernes 10:20","Viernes 11:00","Viernes 11:40","Viernes 12:20",

"Viernes 14:00","Viernes 14:40","Viernes 15:20","Viernes 16:00","Viernes 16:40"

]

const select=document.getElementById("slot")

horarios.forEach(h=>{

let o=document.createElement("option")
o.value=h
o.innerText=h
select.appendChild(o)

})

async function cargar(){

const {data,error}=await supabaseClient
.from("appointments")
.select("*")

if(data){

data.forEach(t=>{

let opt=[...select.options].find(o=>o.value===t.appointment_time)

if(opt) opt.disabled=true

})

}

}

async function reservar(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let slot=document.getElementById("slot").value

if(!name||!email){

alert("Completa nombre y email")
return

}

let {error}=await supabaseClient
.from("appointments")
.insert({
name:name,
email:email,
appointment_time:slot
})

if(error){

document.getElementById("msg").innerText="Turno ya reservado"

}else{

document.getElementById("msg").innerText="Turno reservado correctamente"

location.reload()

}

}

function login(){

let pass=document.getElementById("adminpass").value

if(pass===ADMIN_PASS){

document.getElementById("adminpanel").style.display="block"

cargarAdmin()

}else{

alert("Contraseña incorrecta")

}

}

async function cargarAdmin(){

const {data}=await supabaseClient
.from("appointments")
.select("*")

let lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(t=>{

let li=document.createElement("li")

li.innerHTML=t.appointment_time+" - "+t.name+
" <button onclick='cancelar(\""+t.id+"\")'>Cancelar</button>"

lista.appendChild(li)

})

}

async function cancelar(id){

await supabaseClient
.from("appointments")
.delete()
.eq("id",id)

location.reload()

}

cargar()

</script>

</body>
</html>
